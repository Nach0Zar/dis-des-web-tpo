<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar contraseña | UJIM Empleos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="auth-page">
    <main class="auth-layout">
      <section class="auth-brand">
        <a class="brand" href="index.html">UJIM Empleos</a>
        <h1>Recuperá el acceso a tu portal laboral</h1>
        <p>Usá tu correo institucional para recibir instrucciones de recuperación.</p>
      </section>
      <section class="auth-card">
        <h2>Recuperar contraseña</h2>
        <p>Te enviaremos un enlace para crear una nueva contraseña.</p>
        <label class="form-label">Correo institucional</label>
        <input class="form-control" type="email" placeholder="usuario@ujim.edu.ar">
        <small>Debe pertenecer al dominio institucional.</small>
        <button class="btn btn-primary-ui w-100 mt-3" type="button">Enviar instrucciones</button>
        <a class="back-link" href="empleos.html">Volver al login</a>
      </section>
    </main>
  </body>
</html>
