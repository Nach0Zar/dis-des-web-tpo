<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subir CV | UJIM Empleos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="upload-page">
    <header class="bg-white border-bottom d-lg-none">
      <nav class="navbar">
        <div class="container">
          <a class="navbar-brand" href="index.html">UJIM Empleos</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#cvNav" aria-controls="cvNav" aria-expanded="false" aria-label="Abrir menú">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="cvNav">
            <div class="navbar-nav py-3">
              <a class="nav-link" href="empleos.html">Buscar ofertas</a>
              <a class="nav-link" href="#">Mis postulaciones</a>
              <a class="nav-link" href="casos-exito.html">Casos de éxito</a>
              <a class="nav-link" href="faqs.html">FAQs</a>
              <a class="nav-link" href="info-legal.html">Info legal</a>
              <a class="nav-link" href="perfil.html">Mi perfil</a>
              <a class="nav-link" href="index.html">Cerrar sesión</a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container min-vh-100 d-flex align-items-lg-center justify-content-center p-0 p-lg-4">
      <section class="card upload-sheet">
        <div class="card-body p-4">
          <div class="d-flex align-items-start justify-content-between gap-3 mb-3">
            <div>
              <h1 class="h3 mb-2">Subir CV</h1>
              <p class="mb-0">Agregá tu CV para postularte más rápido a las oportunidades.</p>
            </div>
            <a class="btn btn-link fs-3 text-body p-0" href="perfil.html" aria-label="Cerrar">×</a>
          </div>

          <div class="row g-3">
            <div class="col-lg-4">
              <label class="form-label" for="cv-title">Título del CV</label>
              <input class="form-control" id="cv-title" value="CV principal">
            </div>
            <div class="col-lg-4">
              <label class="form-label" for="cv-area">Área objetivo</label>
              <input class="form-control" id="cv-area" value="Tecnología">
            </div>
            <div class="col-lg-4">
              <label class="form-label" for="cv-availability">Disponibilidad</label>
              <input class="form-control" id="cv-availability" value="Part time">
            </div>
          </div>

          <div class="drop-zone d-flex flex-column align-items-center justify-content-center text-center my-4 p-4">
            <div class="upload-icon rounded-circle d-flex align-items-center justify-content-center mb-3">
              <i class="bi bi-upload fs-4"></i>
            </div>
            <h2 class="h5">Arrastrá tu archivo</h2>
            <p class="mb-0">PDF o DOCX de hasta 5 MB.</p>
          </div>

          <button class="btn btn-outline-primary w-100" type="button">Elegir archivo</button>
          <div class="d-flex gap-3 justify-content-end mt-4">
            <a class="btn btn-outline-primary" href="perfil.html">Cancelar</a>
            <button class="btn btn-primary" type="button">Confirmar carga</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer-ui d-lg-none">
      <div class="container">
        <strong>UJIM Empleos</strong>
        <p>Conecta talento, impulsa futuro</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
