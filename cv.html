<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subir CV | UJIM Empleos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="modal-preview-page">
    <header class="site-header">
      <nav class="container-shell navbar">
        <a class="navbar-brand brand" href="index.html">UJIM Empleos</a>
        <button class="hamburger-btn d-lg-none" type="button" aria-label="Abrir menú"><span></span><span></span><span></span></button>
      </nav>
    </header>

    <main class="modal-stage">
      <section class="bottom-sheet">
        <div class="sheet-header">
          <div>
            <h1>Subir CV</h1>
            <p>Agregá tu CV para postularte más rápido a las oportunidades.</p>
          </div>
          <a class="close-link" href="perfil.html">×</a>
        </div>
        <label class="form-label">Título del CV</label>
        <input class="form-control" value="CV principal">
        <label class="form-label">Área objetivo</label>
        <input class="form-control" value="Tecnología">
        <label class="form-label">Disponibilidad</label>
        <input class="form-control" value="Part time">
        <div class="drop-zone">
          <div class="upload-icon">↑</div>
          <h2>Arrastrá tu archivo</h2>
          <p>PDF o DOCX de hasta 5 MB.</p>
        </div>
        <button class="btn btn-outline-ui w-100" type="button">Elegir archivo</button>
        <div class="sheet-actions">
          <a class="btn btn-outline-ui" href="perfil.html">Cancelar</a>
          <button class="btn btn-primary-ui" type="button">Confirmar carga</button>
        </div>
      </section>
    </main>
  </body>
</html>
