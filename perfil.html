<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi perfil | UJIM Empleos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="container-shell navbar navbar-expand-lg">
        <a class="navbar-brand brand" href="index.html">UJIM Empleos</a>
        <button class="hamburger-btn d-lg-none" type="button" aria-label="Abrir menú"><span></span><span></span><span></span></button>
        <div class="d-none d-lg-flex ms-auto align-items-center gap-3">
          <a class="nav-link" href="empleos.html">Buscar ofertas</a>
          <a class="btn btn-danger-ui" href="index.html">Cerrar sesión</a>
        </div>
      </nav>
    </header>

    <main class="container-shell profile-main">
      <section class="profile-hero">
        <div class="avatar">LM</div>
        <div>
          <h1>Lucía Martínez</h1>
          <p>Estudiante de Sistemas</p>
        </div>
        <span class="chip active">Disponible</span>
        <a class="btn btn-outline-ui ms-lg-auto" href="#">Editar perfil</a>
      </section>

      <div class="row g-4">
        <div class="col-lg-6">
          <section class="form-card profile-card">
            <h2>Datos personales</h2>
            <label class="form-label">Nombre</label>
            <input class="form-control" value="Lucía Martínez">
            <label class="form-label">Mail institucional</label>
            <input class="form-control" value="lucia.martinez@ujim.edu.ar">
            <label class="form-label">Teléfono</label>
            <input class="form-control" value="+54 11 5555 1020">
            <button class="btn btn-primary-ui mt-4" type="button">Guardar</button>
          </section>
        </div>
        <div class="col-lg-6">
          <section class="form-card profile-card">
            <h2>Perfil profesional</h2>
            <label class="form-label">Área objetivo</label>
            <input class="form-control" value="Tecnología">
            <label class="form-label">Nivel</label>
            <input class="form-control" value="Pasantía / Junior">
            <label class="form-label">Modalidad preferida</label>
            <input class="form-control" value="Remoto o híbrido">
            <a class="btn btn-primary-ui mt-4" href="cv.html">Subir CV</a>
          </section>
        </div>
      </div>
    </main>

    <footer class="footer-ui">
      <div class="container-shell">
        <strong>UJIM Empleos</strong>
        <p>Conecta talento, impulsa futuro</p>
      </div>
    </footer>
  </body>
</html>
